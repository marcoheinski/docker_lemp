server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.php index.html;

    # Tamanho máximo de upload (ajuste conforme necessidade do site)
    client_max_body_size 32M;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        fastcgi_pass site1-php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Bloqueia acesso a arquivos sensíveis do Joomla
    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~ /(administrator/)?configuration\.php$ {
        # protege configuration.php contra leitura direta indevida
        deny all;
    }

    # Cache de arquivos estáticos
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff2?)$ {
        expires 7d;
        access_log off;
    }
}
