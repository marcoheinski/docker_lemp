services:
  # ---------------------------------------------------------
  # MySQL do site1
  # ---------------------------------------------------------
  site1-mysql:
    image: mysql:8.0
    container_name: site1-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${SITE1_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${SITE1_DB_NAME}
      MYSQL_USER: ${SITE1_DB_USER}
      MYSQL_PASSWORD: ${SITE1_DB_PASSWORD}
    volumes:
      - site1-mysql-data:/var/lib/mysql
    networks:
      - site1
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${SITE1_DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------
  # PHP-FPM do site1 (build customizado com extensões do Joomla)
  # ---------------------------------------------------------
  site1-php:
    build:
      context: ./site1
      dockerfile: Dockerfile
    container_name: site1-php
    restart: unless-stopped
    volumes:
      - ./site1/public:/var/www/html
    environment:
      DB_HOST: site1-mysql
      DB_NAME: ${SITE1_DB_NAME}
      DB_USER: ${SITE1_DB_USER}
      DB_PASSWORD: ${SITE1_DB_PASSWORD}
    depends_on:
      site1-mysql:
        condition: service_healthy
    networks:
      - site1

  # ---------------------------------------------------------
  # Nginx do site1
  # ---------------------------------------------------------
  site1-nginx:
    image: nginx:alpine
    container_name: site1-nginx
    restart: unless-stopped
    ports:
      - "${SITE1_HOST_PORT}:80"
    volumes:
      - ./site1/public:/var/www/html
      - ./site1/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - site1-php
    networks:
      - site1

networks:
  site1:
    name: site1-internal

volumes:
  site1-mysql-data:
    name: site1-mysql-data
